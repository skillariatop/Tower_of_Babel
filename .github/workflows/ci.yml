name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy bot/ orchestrator/ integrations/ --ignore-missing-imports
        continue-on-error: true  # remove once stubs are added

      - name: Tests
        run: pytest --cov=bot --cov=orchestrator --cov-report=term-missing
