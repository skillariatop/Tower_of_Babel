name: RFC (Request for Comments)
description: A major proposal that needs community discussion before a vote
labels: ["rfc", "discussion"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you solving?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What do you suggest?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about?
    validations:
      required: false

  - type: textarea
    id: tradeoffs
    attributes:
      label: Trade-offs
      description: What are the downsides?
    validations:
      required: false

  - type: dropdown
    id: vote_level
    attributes:
      label: Expected vote level
      description: What level of vote will this require?
      options:
        - routine
        - significant
        - critical
    validations:
      required: true
