name: Task
description: A development task spawned from a community decision
labels: ["task"]
body:
  - type: input
    id: decision
    attributes:
      label: Decision
      description: Which decision file spawned this task?
      placeholder: "decisions/0002-choose-tech-stack.yaml"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] criterion 1
        - [ ] criterion 2
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - bot
        - orchestrator
        - integrations
        - infra
        - docs
        - other
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate
      description: Rough effort estimate
      placeholder: "S / M / L"
