name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `…`
        2. Observe `…`
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Environment
      placeholder: "Python version, OS, bot version, relevant logs"
